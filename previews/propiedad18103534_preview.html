      <div class="property__image-gallery">

        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">

        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_4.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_10.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_11.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_12.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });
  })();

</script>

</body>
</html>
