      </div>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_hero.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_4.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_6.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp34/caroProp34_9.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
        img.src = images[currentIndex];
      if (counter) {
        counter.textContent =
          (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;

      } else {
        // swipe derecha → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      }

      updateSlider();
    }

  })();

</script>

</body>
</html>
