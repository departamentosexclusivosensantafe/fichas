<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Prueba slider hero</title>

<link rel="stylesheet" href="../blocks/property.css" />

<meta property="og:title" content="Prueba slider hero" />
<meta property="og:description" content="Slider hero descripción" />
<meta property="og:image" content="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_hero.jpeg" />
<meta property="og:url" content="https://departamentosexclusivosensantafe.github.io/fichas/previews/propiedad18172244_preview.html" />
<meta property="og:type" content="website" />

</head>

<body class="theme-modern">
  <main class="property">

    <section class="property__content">

      <div class="property__hero-slider">
        <img class="property__hero-image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_7.jpeg" alt="Prueba slider hero" />

        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>

        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>

      <div class="property__counter" id="imageCounter">
        1 / 9
      </div>

      <div>
        <h1 class="property__title">Prueba slider hero</h1>
        <p class="property__price">11,111.00 MXN</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">feat 5</li><li class="property__feature">feat 5</li><li class="property__feature">feat 5</li><li class="property__feature">feat 5</li><li class="property__feature">feat 5</li><li class="property__feature">feat 5</li><li class="property__feature">feat 5</li>
        </ul>
      </div>

      <div>
        <p class="property__description">Slider hero descripción</p>
      </div>

      <div class="property__image-gallery">
        <img class="property__image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_7.jpeg" alt="Prueba slider hero">
        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>
        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>
      <div class="property__counter" id="imageCounter">
        1 / 1
      </div>
        
      <div>
      <p class="property__location-label">Parroquia de San Josemaria Escrivá</p>
        <a
        href="https://www.google.com/maps?q=Parroquia%20de%20San%20Josemaria%20Escriv%C3%A1"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_10.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_11.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_13.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_14.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_15.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_16.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      } else {
        // swipe derecha → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;
      }

      updateSlider();
    }

  })();

</script>

</body>
</html>
