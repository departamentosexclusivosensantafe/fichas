<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Rento departamento en We, Santa Fe</title>

<link rel="stylesheet" href="../blocks/property.css" />

<meta property="og:title" content="Rento departamento en We, Santa Fe" />
<meta property="og:description" content="Amenidades exclusivas." />
<meta property="og:image" content="https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_hero.jpeg" />
<meta property="og:url" content="https://sergiovv2025.github.io/fichas_tecnicas/previews/propiedad5173802_preview.html" />
<meta property="og:type" content="website" />

</head>

<body class="theme-modern">
  <main class="property">

    <section class="property__content">

      <div>
        <img class="property__hero-image" src="https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_hero.jpeg" alt="Rento departamento en We, Santa Fe" />
      </div>

      <div>
        <h1 class="property__title">Rento departamento en We, Santa Fe</h1>
        <p class="property__price">25,000.00</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">62m²</li><li class="property__feature">1 Recámara</li><li class="property__feature">1 Baño</li><li class="property__feature">1 Estacionamiento</li><li class="property__feature">2 Terrazas</li><li class="property__feature">Mantenimiento incluido</li>
        </ul>
      </div>

      <div>
        <p class="property__description">Amenidades exclusivas.</p>
      </div>

      <div class="property__image-gallery">
        <img class="property__image" src="https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_1.jpeg" alt="Rento departamento en We, Santa Fe">
        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://sergiovv2025.github.io/fichas_tecnicas/images/arrow_back.png" alt="Left arrow">
        </button>
        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://sergiovv2025.github.io/fichas_tecnicas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>
      <div class="property__counter" id="imageCounter">
        1 / 1
      </div>
        
      <div>
      <p class="property__location-label">We Santa Fe</p>
        <a
        href="https://www.google.com/maps?q=We%20Santa%20Fe"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_1.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_2.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_3.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_4.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_5.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_6.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_7.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_8.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_9.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_10.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_11.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_13.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_14.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_15.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_16.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_18.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_19.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_20.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_21.jpeg","https://sergiovv2025.github.io/fichas_tecnicas/images/caroProp5_22.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });
  })();

</script>

</body>
</html>
