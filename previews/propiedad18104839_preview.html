<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_2_hero.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_1.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_2.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_3.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_4.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_5.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_6.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_7.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_8.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_9.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_10.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_3.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_4.jpg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      } else {
        // swipe derecha → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;
      }

      updateSlider();
    }

  })();

</script>
