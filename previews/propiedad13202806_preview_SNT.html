<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Renta de departamento en Satori, Santa Fe</title>

<link rel="stylesheet" href="../blocks/property.css" />

<meta property="og:title" content="Renta de departamento en Satori, Santa Fe" />
<meta property="og:description" content="Renta incluye mantenimiento" />
<meta property="og:image" content="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_13.jpeg" />

</head>

<body class="theme-modern">
  <main class="property">

    <section class="property__content">

      <div>
        <img class="property__hero-image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_13.jpeg" alt="Renta de departamento en Satori, Santa Fe" />
      </div>

      <div>
        <h1 class="property__title">Renta de departamento en Satori, Santa Fe</h1>
        <p class="property__price">32,000.00 MXN</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">83.17 m²</li><li class="property__feature">2 Recámaras</li><li class="property__feature">2 Baños</li><li class="property__feature">2 Estacionamientos</li><li class="property__feature">Incluye mantenimiento</li>
        </ul>
      </div>

      <div>
        <p class="property__description">Renta incluye mantenimiento</p>
      </div>

      <div class="property__image-gallery">
        <img class="property__image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_1.jpeg" alt="Renta de departamento en Satori, Santa Fe">
        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>
        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>
      <div class="property__counter" id="imageCounter">
        1 / 1
      </div>
        
      <div>
      <p class="property__location-label">Satori Santa Fe Living</p>
        <a
        href="https://www.google.com/maps?q=Satori%20Santa%20Fe%20Living"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_4.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_6.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_10.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_11.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_12.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_14.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_15.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_16.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_17.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_18.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp13_19.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_4.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_6.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_10.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_11.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_12.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_13.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_14.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_15.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_16.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_17.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_18.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_19.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Satori_Santafe/Satori_Santafe_20.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });
  })();

</script>

</body>
</html>
