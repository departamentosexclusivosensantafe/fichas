<head>

<body class="theme-classic">
  <main class="property">

    <section class="property__content">

      <div class="property__hero-slider">
        <img class="property__hero-image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_hero.jpeg" alt="3 - Departamento en renta en Bosque Real" />

        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>

        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>

      <div class="property__counter" id="imageCounter">
        1 / 36
      </div>

      <div>
        <h1 class="property__title">3 - Departamento en renta en Bosque Real</h1>
        <p class="property__price">333,111.00 MXN</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li>
        </ul>
      </div>

      <div>
        <p class="property__description">Amenidades: Asadores, Business Center, Ludoteca y Área de mascotas.</p>
      </div>
        
      <div>
      <p class="property__location-label">Argenta Towers, Bosque Real</p>
        <a
        href="https://www.google.com/maps?q=Argenta%20Towers%2C%20Bosque%20Real"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_hero.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_1.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_2.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_3.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_4.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_5.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_6.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_7.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_8.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_9.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_10.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_11.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_12.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_13.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_14.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_15.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_16.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_17.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_18.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_19.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_20.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_21.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_22.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_23.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_24.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_25.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_26.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_27.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_28.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_29.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_30.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_31.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_32.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_33.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_34.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_35.jpg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      } else {
        // swipe derecha → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;
      }

      updateSlider();
    }

  })();

</script>

</body>
</html>
