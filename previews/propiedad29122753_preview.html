<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_hero.jpeg ","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_4.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_6.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_10.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_11.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp18_12.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      // img.style.opacity = 0;

      // setTimeout(() => {
        img.src = images[currentIndex];
      //   img.style.opacity = 1;
      // }, 150);

      if (counter) {
        counter.textContent =
          (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      } else {
        // swipe derecha → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;
      }

      updateSlider();
    }

  })();

</script>
