<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Prueba 8 Slider</title>

<link rel="stylesheet" href="../blocks/property.css" />

<meta property="og:title" content="Prueba 8 Slider" />
<meta property="og:description" content="Descripción prueba 8 Slider" />
<meta property="og:image" content="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp10_hero.jpeg" />
<meta property="og:url" content="https://departamentosexclusivosensantafe.github.io/fichas/previews/propiedad18112339_preview.html" />
<meta property="og:type" content="website" />

</head>

<body class="theme-modern">
  <main class="property">

    <section class="property__content">

      <div class="property__hero-slider">
        <img class="property__hero-image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp10_hero.jpeg" alt="Prueba 8 Slider" />

        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>

        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>

      <div class="property__counter" id="imageCounter">
        1 / 21
      </div>

      <div>
        <h1 class="property__title">Prueba 8 Slider</h1>
        <p class="property__price">888,111.00 MXN</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li><li class="property__feature">Feat 8</li>
        </ul>
      </div>

      <div>
        <p class="property__description">Descripción prueba 8 Slider</p>
      </div>

      <div class="property__image-gallery">
        <img class="property__image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp10_hero.jpeg" alt="Prueba 8 Slider">
        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>
        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>
      <div class="property__counter" id="imageCounter">
        1 / 1
      </div>
        
      <div>
      <p class="property__location-label">We Santa Fe</p>
        <a
        href="https://www.google.com/maps?q=We%20Santa%20Fe"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp10_hero.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_3.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_4.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_2_4.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_2_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_2_6.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp9_2_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp6_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp6_6.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp6_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp6_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp6_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_29.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_30.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_31.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_32.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp3_33.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp5_9.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      } else {
        // swipe derecha → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;
      }

      updateSlider();
    }

  })();

</script>

</body>
</html>
