<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Prueba 3 form nuevo</title>

<link rel="stylesheet" href="../blocks/property.css" />

<meta property="og:title" content="Prueba 3 form nuevo" />
<meta property="og:description" content="Descripción prueba 3 form nuevo" />
<meta property="og:image" content="https://departamentosexclusivosensantafe.github.io/fichas/images/Condominio_La_Isla/Condominio_La_Isla_hero.jpeg" />
<meta property="og:url" content="https://departamentosexclusivosensantafe.github.io/fichas/previews/propiedad28210616_preview.html" />
<meta property="og:type" content="website" />

</head>

<body class="theme-rock">
  <main class="property">

    <section class="property__content">

      <div class="property__hero-slider">
        <img class="property__hero-image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_18.jpeg" alt="Prueba 3 form nuevo" />

        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>

        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>

      <div class="property__counter" id="imageCounter">
        1 / 17
      </div>

      <div>
        <h1 class="property__title">Prueba 3 form nuevo</h1>
        <p class="property__price">549,875.00 MXN</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">Caracteristica</li><li class="property__feature">Caracteristica</li><li class="property__feature">Caracteristica</li><li class="property__feature">Caracteristica</li><li class="property__feature">Caracteristica</li><li class="property__feature">Caracteristica</li>
        </ul>
      </div>

      <div>
        <p class="property__description">Descripción prueba 3 form nuevo</p>
      </div>
        
      <div>
      <p class="property__location-label">Parroquia de San Josemaria Escrivá</p>
        <a
        href="https://www.google.com/maps?q=Parroquia%20de%20San%20Josemaria%20Escriv%C3%A1"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_18.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_19.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_20.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_21.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_22.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_23.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_24.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_25.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_26.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_27.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_28.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_29.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp19_30.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Condominio_La_Isla/Condominio_La_Isla_1.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Condominio_La_Isla/Condominio_La_Isla_2.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Condominio_La_Isla/Condominio_La_Isla_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/Condominio_La_Isla/Condominio_La_Isla_4.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.style.opacity = 0;

      setTimeout(() => {
        img.src = images[currentIndex];
        img.style.opacity = 1;
      }, 150);

      if (counter) {
        counter.textContent =
          (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      } else {
        // swipe derecha → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;
      }

      updateSlider();
    }

  })();

</script>

</body>
</html>
