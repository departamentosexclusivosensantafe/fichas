<head>

<body class="theme-modern">
  <main class="property">

    <section class="property__content">

      <div class="property__hero-slider">
        <img class="property__hero-image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/High_Park_Santafe/High_Park_Santafe_hero.jpg" alt="Prueba 6" />

        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>

        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>

      <div class="property__counter" id="imageCounter">
        1 / 9
      </div>

      <div>
        <h1 class="property__title">Prueba 6</h1>
        <p class="property__price">63,524.00 MXN</p>
      </div>

      <div>
        <ul class="property__features-list">
          <li class="property__feature">Feat 6</li><li class="property__feature">Feat 6</li><li class="property__feature">Feat 6</li><li class="property__feature">Feat 6</li><li class="property__feature">Feat 6</li><li class="property__feature">Feat 6</li><li class="property__feature">Feat 6</li>
        </ul>
      </div>

      <div>
        <p class="property__description">Descripcion 6</p>
      </div>

      <div class="property__image-gallery">
        <img class="property__image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/High_Park_Santafe/High_Park_Santafe_hero.jpg" alt="Prueba 6">
        <button class="property__btn property__btn-left" id="btnBack">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_back.png" alt="Left arrow">
        </button>
        <button class="property__btn property__btn-right" id="btnForward">
          <img class="property__btn_image" src="https://departamentosexclusivosensantafe.github.io/fichas/images/arrow_forward.png" alt="Right arrow">
        </button>
      </div>
      <div class="property__counter" id="imageCounter">
        1 / 1
      </div>
        
      <div>
      <p class="property__location-label">Auras 75, Lomas de Guadalupe, Álvaro Obregón, 01720 Ciudad de México, CDMX</p>
        <a
        href="https://www.google.com/maps?q=Auras%2075%2C%20Lomas%20de%20Guadalupe%2C%20%C3%81lvaro%20Obreg%C3%B3n%2C%2001720%20Ciudad%20de%20M%C3%A9xico%2C%20CDMX"
        target="_blank"
        class="property__map-link"
        >
          Ir a ubicación &rarr;
        </a>
      </div>
    </section>

  </main>
<script>
  (function () {
    const images = ["https://departamentosexclusivosensantafe.github.io/fichas/images/High_Park_Santafe/High_Park_Santafe_hero.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_3.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_4.jpg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_5.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_6.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_7.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_8.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_9.jpeg","https://departamentosexclusivosensantafe.github.io/fichas/images/caroProp8_10.jpeg"];
    let currentIndex = 0;

    const img = document.querySelector(".property__hero-image");
    const btnBack = document.getElementById("btnBack");
    const btnForward = document.getElementById("btnForward");
    const counter = document.getElementById("imageCounter");

    if (!img || !btnBack || !btnForward || images.length === 0) return;

    function updateSlider() {
      img.src = images[currentIndex];

      if (counter) {
        counter.textContent = (currentIndex + 1) + " / " + images.length;
      }
    }

    // 🔹 render inicial
    updateSlider();

    btnForward.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      updateSlider();
    });

    btnBack.addEventListener("click", () => {
      currentIndex =
        (currentIndex - 1 + images.length) % images.length;
      updateSlider();
    });

    // Swipe support
    let startX = 0;
    let endX = 0;

    img.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    img.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      // sensibilidad mínima
      if (Math.abs(diff) < 50) return;

      if (diff > 0) {
        // swipe izquierda → siguiente
        currentIndex = (currentIndex + 1) % images.length;
      } else {
        // swipe derecha → anterior
        currentIndex =
          (currentIndex - 1 + images.length) % images.length;
      }

      updateSlider();
    }

  })();

</script>

</body>
</html>
