<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Ficha Técnica Inmobiliaria</title>
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <nav class="header__nav" aria-label="Navegación principal del sitio">
          <ul class="nav__list">
            <li class="nav__list-item nav__dropdown">
              <button class="nav__list-link" type="button">Inicio</button>
              <div class="nav__dropdown-content">
                <button
                  class="nav__list-link nav__list-link__card"
                  type="button"
                >
                  Card
                </button>
                <button
                  class="nav__list-link nav__list-link__preview"
                  type="button"
                >
                  Preview
                </button>
              </div>
            </li>
            <li class="nav__list-item nav__dropdown">
              <button class="nav__list-link" type="button">Backup</button>
              <div class="nav__dropdown-content">
                <button
                  class="nav__list-link nav__list-link__export"
                  type="button"
                >
                  Export
                </button>
                <button
                  class="nav__list-link nav__list-link__import"
                  type="button"
                >
                  Import
                </button>
              </div>
            </li>
          </ul>
        </nav>
      </header>
      <main class="content">
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <div class="card__image-container">
                  <div class="card__spinner"></div>
                  <img class="card__image" src="" alt="" />
                </div>
                <button
                  aria-label="Eliminar tarjeta"
                  class="card__delete-button"
                  type="button"
                ></button>
                <button
                  aria-label="Edtar tarjeta"
                  class="card__edit-button"
                  type="button"
                ></button>
                <div class="card__descriptionContainer">
                  <p class="card__id"></p>
                  <p class="card__title"></p>
                  <p class="card__price"></p>
                  <p class="card__description"></p>
                  <p class="card__features"></p>
                  <div class="card__gallery">
                    <!-- Galeria de imagenes -->
                  </div>
                  <p class="card__address"></p>
                  <p class="card__theme"></p>
                  <div class="card__bottom_buttons">
                    <button
                      aria-label="Botón Whatsapp"
                      class="card__whatsapp-button"
                      type="button"
                    ></button>
                    <button
                      aria-label="Botón Me gusta"
                      class="card__like-button"
                      type="button"
                    ></button>
                  </div>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">© 2026 Sergio Verástegui Vega</p>
      </footer>
      <div class="popup" id="new-card-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Nueva propiedad</h3>
          <form class="popup__form" id="new-card-form" name="new-card-form">
            <!-- <label class="input__label">Hero</label> -->
            <input
              class="popup__input popup__input_type_card-hero"
              name="hero"
              placeholder="Hero"
              required
              type="text"
              minlength="2"
            />
            <span class="popup__error popup__error_hero"></span>
            <!-- <label class="input__label">Title</label> -->
            <input
              class="popup__input popup__input_type_card-title"
              name="title"
              placeholder="Title"
              required
              type="text"
              minlength="2"
            />
            <span class="popup__error popup__error_title"></span>
            <!-- <label class="input__label">Precio</label> -->
            <input
              class="popup__input popup__input_type_card-price"
              name="price"
              placeholder="Precio"
              required
              type="text"
              minlength="2"
            />
            <span class="popup__error popup__error_price"></span>
            <!-- <label class="input__label">Descripción</label> <br /> -->
            <textarea
              class="popup__input popup__textarea input__textarea-description"
              name="description"
              placeholder="Descripción"
              required
              minlength="2"
            ></textarea>
            <span class="popup__error popup__error_description"></span>
            <!-- <label class="input__label">Features</label> <br /> -->
            <textarea
              class="popup__input popup__textarea input__textarea-features"
              name="features"
              placeholder="Features (una por renglón)"
              required
              minlength="2"
            ></textarea>
            <span class="popup__error popup__error_features"></span>
            <!-- <label class="input__label">Galería</label> -->
            <textarea
              class="popup__input popup__textarea input__textarea-gallery"
              name="gallery"
              placeholder="Galería (una imagen por renglón)"
              required
              minlength="2"
            ></textarea>
            <span class="popup__error popup__error_gallery"></span>
            <!-- <label class="input__label">Direccón</label> -->
            <input
              class="popup__input popup__input_type_card-address"
              name="address"
              placeholder="Dirección"
              required
              type="text"
              minlength="2"
            />
            <span class="popup__error popup__error_address"></span>
            <!-- <label class="input__label">Theme</label> -->
            <select
              class="popup__input popup__select popup__input_type_card-theme"
              name="theme"
              required
            >
              <option
                class="popup__select popup__select_option-selected"
                value=""
                selected
              >
                Theme
              </option>
              <option value="theme-classic">Classic</option>
              <option value="theme-modern">Modern</option>
              <option value="theme-luxury">Luxury</option>
              <option value="theme-rock">Rock</option>
              <option value="theme-minimal">Minimal</option>
            </select>
            <span class="popup__error popup__error_theme"></span>
            <!-- <label class="input__label">Time</label> -->
            <input
              class="popup__input popup__input_type_card-time"
              name="time"
              required
              type="hidden"
            />
            <button
              class="button popup__button"
              type="submit"
              name="popup__button"
              disabled
            >
              Crear
            </button>
          </form>
        </div>
      </div>
      <div class="popup" id="new-preview-popup">
        <div class="popup__content preview">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Nuevo preview</h3>
          <form
            class="popup__form"
            id="new-preview-form"
            name="new-preview-form"
          >
            <div class="preview__content">
              <div class="preview__left">
                <!-- <label class="input__label">Id</label> -->
                <input
                  class="popup__input popup__input_type_property-id"
                  name="id"
                  placeholder="Id"
                  required
                  type="number"
                  min="1"
                />
                <span class="popup__error popup__error_id"></span>
                <!-- <label class="input__label">Title</label> -->
                <input
                  class="popup__input popup__input_type_property-title"
                  name="title"
                  placeholder="Title"
                  required
                  type="text"
                  minlength="2"
                />
                <span class="popup__error popup__error_title"></span>
                <!-- <label class="input__label">Descripción Open Graph</label> <br /> -->
                <textarea
                  class="popup__input popup__textarea input__textarea-descriptionOG"
                  name="descriptionOG"
                  placeholder="Descripción Open Graph"
                  required
                  minlength="2"
                ></textarea>
                <span class="popup__error popup__error_descriptionOG"></span>
                <!-- <label class="input__label">Imagen Hero</label> -->
                <input
                  class="popup__input popup__input_type_imageOG"
                  name="imageOG"
                  placeholder="https:// (Imagen Open Graph (URL absoluta))"
                  required
                  type="text"
                  minlength="2"
                />
                <span class="popup__error popup__error_imageOG"></span>
                <!-- <label class="input__label">URL pública base del proyecto</label> -->
                <input
                  class="popup__input popup__input_type_urlProject"
                  name="urlProject"
                  placeholder="https://usuario.github.io/proyecto/ (URL pública base del proyecto)"
                  required
                  type="text"
                  minlength="2"
                />
                <span class="popup__error popup__error_urlProject"></span>
                <!-- <label class="input__label">Precio</label> -->
                <input
                  class="popup__input popup__input_type_preview-price"
                  name="price"
                  placeholder="Precio (ej: 2500)"
                  required
                  type="text"
                  minlength="2"
                />
              </div>
              <div class="preview__right">
                <span class="popup__error popup__error_price"></span>
                <!-- <label class="input__label">Features</label> -->
                <textarea
                  class="popup__input popup__textarea popup__input_type_preview-features"
                  name="features"
                  placeholder="Características separadas por comas o una por renglón."
                  required
                  minlength="2"
                ></textarea>
                <span class="popup__error popup__error_features"></span>
                <!-- <label class="input__label">Image Gallery</label> -->
                <textarea
                  class="popup__input popup__textarea popup__input_type_preview-gallery"
                  name="gallery"
                  placeholder="URLs de imágenes, una por renglón"
                  required
                  minlength="2"
                ></textarea>
                <span class="popup__error popup__error_gallery"></span>
                <!-- <label class="input__label">Address</label> -->
                <input
                  class="popup__input popup__input_type_preview-address"
                  name="address"
                  placeholder="Dirección"
                  required
                  type="text"
                  minlength="2"
                />
                <span class="popup__error popup__error_address"></span>
                <!-- <label class="input__label">Estilos de Preview</label> -->
                <select
                  class="popup__input popup__select popup__input_type_preview-theme"
                  name="theme"
                  required
                >
                  <option
                    class="popup__select popup__select_option-selected"
                    value=""
                    selected
                  >
                    Theme
                  </option>
                  <option value="theme-classic">Classic</option>
                  <option value="theme-modern">Modern</option>
                  <option value="theme-luxury">Luxury</option>
                  <option value="theme-rock">Rock</option>
                  <option value="theme-minimal">Minimal</option>
                </select>
                <span class="popup__error popup__error_theme"></span>
                <!-- <label class="input__label">Time</label> -->
                <input
                  class="popup__input popup__input_type_preview-time"
                  name="time"
                  placeholder="Hora de creación (ej: 123456)"
                  required
                  type="text"
                  minlength="2"
                />
                <span class="popup__error popup__error_time"></span>
              </div>
            </div>
            <button class="button popup__button" type="submit" disabled>
              Crear
            </button>
          </form>
        </div>
      </div>
      <div class="popup" id="new-export-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Export Local Storage</h3>
          <form class="popup__form" id="new-export-form" name="new-export-form">
            <!-- <label class="input__label">Export</label> -->
            <input
              class="popup__input popup__input_type_file-export"
              name="export"
              placeholder="Export"
              required
              type="text"
              minlength="2"
            />
            <span class="popup__error popup__error_export"></span>
            <button class="button popup__button" type="submit" disabled>
              Exportar
            </button>
          </form>
        </div>
      </div>
      <div class="popup" id="new-import-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Import Local Storage</h3>
          <form class="popup__form" id="new-import-form" name="new-import-form">
            <input
              class="popup__input popup__input_type_file-import"
              name="import"
              placeholder="Local Storage"
              required
              type="file"
            />
            <button class="button popup__button" type="submit" disabled>
              Importar
            </button>
            <span class="popup__error popup__error_import"></span>
          </form>
        </div>
      </div>
      <div class="popup" id="new-confirmation-popup">
        <div class="popup__content popup__content_confirmation">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">¿Estas seguro?</h3>
          <form
            class="popup__form"
            id="new-confirmation-form"
            name="new-confirmation-form"
          >
            <button class="button popup__button" type="submit">Si</button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="./pages/index.js"></script>
  </body>
</html>
